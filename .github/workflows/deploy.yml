name: Deploy to VPS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_MAIN_DOMAIN_URL=${{ secrets.NEXT_PUBLIC_MAIN_DOMAIN_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Lowercase the repository name for Docker
            IMAGE_RAW="ghcr.io/${{ github.repository }}"
            IMAGE_NAME=$(echo $IMAGE_RAW | tr '[:upper:]' '[:lower:]')

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            mkdir -p ~/file-storage
            cd ~/file-storage

            # Create a Docker network for the services if it doesn't exist
            docker network create file-storage-network 2>/dev/null || true

            # Pull the latest image
            docker pull $IMAGE_NAME:latest

            # Stop and remove existing container
            docker stop file-storage 2>/dev/null || true
            docker rm file-storage 2>/dev/null || true

            # Start the file-storage container
            docker run -d \
              --name file-storage \
              --network file-storage-network \
              --restart unless-stopped \
              -p 3001:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e CONVEX_DEPLOYMENT="${{ secrets.CONVEX_DEPLOYMENT }}" \
              -e CONVEX_DEPLOY_KEY="${{ secrets.CONVEX_DEPLOY_KEY }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e NEXT_PUBLIC_CONVEX_URL="${{ secrets.NEXT_PUBLIC_CONVEX_URL }}" \
              -e NEXT_PUBLIC_MAIN_DOMAIN_URL="${{ secrets.NEXT_PUBLIC_MAIN_DOMAIN_URL }}" \
              $IMAGE_NAME:latest

            docker image prune -af --filter "until=24h"

            echo "Running containers:"
            docker ps | grep "file-storage"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sleep 10
            # Assuming there is a health check endpoint or just checking root
            curl -f http://localhost:3001/ || echo "Warning: Health check endpoint might not be available yet"
            echo "Deployment successful"
